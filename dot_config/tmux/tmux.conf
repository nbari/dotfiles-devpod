# ----------------------------------------------------------------------------
# tmux — agnostic, dependency-free config (no TPM / plugins required).
# Lives at ~/.config/tmux/tmux.conf (read by tmux 3.1+).
# ----------------------------------------------------------------------------

# True color + correct terminfo so colors/italics render like the host. Without
# this (and a UTF-8 client locale) tmux falls back to washed-out colors and ASCII
# pane borders.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,xterm-256color:RGB,alacritty:RGB,foot*:RGB,wezterm:RGB"

# ----------------------------------------------------------------------------
# Behavior
# ----------------------------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10            # no <Esc> lag in nvim
set -g focus-events on
set -g base-index 1               # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
setw -g mode-keys vi
set -g display-time 2000
set -g status-interval 5

# Splits that keep the current path; new window keeps path too.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# vi-style copy mode.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ----------------------------------------------------------------------------
# Appearance
# ----------------------------------------------------------------------------
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=colour245"

set -g status-left " #[fg=colour39,bold]#S #[default]"
set -g status-left-length 30
set -g status-right "#[fg=colour245]#h #[fg=colour39]%Y-%m-%d %H:%M "
set -g status-right-length 60

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour39,bold] #I:#W #[default]"
setw -g window-status-separator ""

# Pane borders + titles (the part that looked broken without a UTF-8 locale).
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{pane_title} "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"

set -g message-style "bg=colour39,fg=black"
set -g mode-style "bg=colour39,fg=black"
